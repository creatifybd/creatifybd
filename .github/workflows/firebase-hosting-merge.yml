# Deploy to Firebase Hosting on merge to main
  #
  # Why continue-on-error on the deploy step?
  # Firebase returns HTTP 400 "already active version" when the build output is
  # bit-for-bit identical to the currently deployed version. This happened when
  # only non-source files (docs/CI configs) changed, producing an identical dist/.
  #
  # The vite.config.js 'inject-build-meta' plugin injects a unique VITE_BUILD_ID
  # + ISO timestamp into index.html on every CI run, guaranteeing a different
  # index.html hash and preventing the 400. continue-on-error is kept as a safety
  # net; the "Verify site is live" curl step is the real health gate.

  name: Deploy to Firebase Hosting on merge
  'on':
    push:
      branches:
        - main
  jobs:
    build_and_deploy:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with:
            submodules: false

        - name: Build
          run: npm ci && npm run build
          env:
            VITE_BUILD_ID: ${{ github.run_id }}
            VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || '' }}
            VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || '' }}
            VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || '' }}
            VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || '' }}
            VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '' }}
            VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '' }}
            VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || '' }}

        - name: Deploy to Firebase Hosting
          id: firebase_deploy
          continue-on-error: true
          uses: FirebaseExtended/action-hosting-deploy@v0
          with:
            repoToken: '${{ secrets.GITHUB_TOKEN }}'
            firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_CREATIFY_BD }}'
            channelId: live
            projectId: creatify-bd

        - name: Report deploy outcome
          run: |
            if [ "${{ steps.firebase_deploy.outcome }}" = "success" ]; then
              echo "✅ Firebase deploy succeeded — new version is live."
            else
              echo "⚠️  Firebase deploy action returned non-success."
              echo "   Most likely cause: build output was identical to current live version."
              echo "   The curl health check below is the authoritative gate."
            fi

        - name: Verify site is live
          run: |
            echo "Verifying creatifybd.com is reachable..."
            curl -sf --max-time 20 https://creatifybd.com > /dev/null \
              && echo "✅ Site is live at creatifybd.com" \
              || (echo "❌ Site unreachable — deploy may have genuinely failed!" && exit 1)
  