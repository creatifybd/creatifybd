name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Build
        run: npm ci && npm run build
        env:
          VITE_BUILD_ID: ${{ github.run_id }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY || '' }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN || '' }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || '' }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET || '' }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID || '' }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID || '' }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID || '' }}

      - name: Check build artifact contains build-id
        run: |
          if [ ! -f dist/index.html ]; then
            echo "ERROR: dist/index.html not found"
            ls -la
            exit 1
          fi
          echo "--- build-id grep ---"
          grep -n "build-id" dist/index.html || echo "WARNING: build-id meta tag not found in dist/index.html"
          grep -n "$GITHUB_RUN_ID" dist/index.html || echo "WARNING: run_id not found in dist/index.html"
          echo "--- head of dist/index.html ---"
          head -n 10 dist/index.html
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Configure Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CREATIFY_BD }}
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-service-account.json"

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools@15.16.0 deploy --only hosting --project creatify-bd --non-interactive

      - name: Verify this build is live
        run: |
          echo "Verifying build $GITHUB_RUN_ID at creatifybd.com..."
          URL="https://creatifybd.com/?build=$GITHUB_RUN_ID"
          TMP=$(mktemp)
          MAX_TRIES=12
          SLEEP_SECONDS=10
          for i in $(seq 1 $MAX_TRIES); do
            HTTP_CODE=$(curl -sS -o "$TMP" -w "%{http_code}" --max-time 30 "$URL" || echo "000")
            echo "Attempt $i/$MAX_TRIES: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ] && grep -Fq "name=\"build-id\" content=\"$GITHUB_RUN_ID\"" "$TMP"; then
              echo "Build $GITHUB_RUN_ID verified live."
              rm -f "$TMP"
              exit 0
            fi
            if [ "$i" -lt "$MAX_TRIES" ]; then
              echo "Not yet — waiting ${SLEEP_SECONDS}s..."
              echo "Body preview:"
              head -n 5 "$TMP"
              sleep $SLEEP_SECONDS
            fi
          done
          echo "=== Final response body ==="
          cat "$TMP"
          rm -f "$TMP"
          echo "Build verification failed after $((MAX_TRIES * SLEEP_SECONDS))s."
          exit 1
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
